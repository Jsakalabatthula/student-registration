name: Deploy existing image to GKE

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  IMAGE: ${{ vars.GAR_LOCATION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.GAR_REPOSITORY }}/student-registration:manual-v1

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.DEPLOY_SERVICE_ACCOUNT }}

      - name: Set up Google Cloud CLI
        uses: google-github-actions/setup-gcloud@v3

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v3
        with:
          cluster_name: ${{ vars.GKE_CLUSTER }}
          location: ${{ vars.GKE_LOCATION }}
          project_id: ${{ vars.GCP_PROJECT_ID }}

      - name: Verify cluster resources
        run: |
          echo "Current Kubernetes context:"
          kubectl config current-context

          echo "Namespaces:"
          kubectl get ns

          echo "Resources in namespace:"
          kubectl get all -n "${{ vars.K8S_NAMESPACE }}"

          echo "Current deployment image:"
          kubectl get deployment student-registration \
            -n "${{ vars.K8S_NAMESPACE }}" \
            -o jsonpath='{.spec.template.spec.containers[0].image}'
          echo

      - name: Deploy existing image
        run: |
          kubectl set image deployment/student-registration \
            application="$IMAGE" \
            -n "${{ vars.K8S_NAMESPACE }}"

          kubectl rollout status deployment/student-registration \
            -n "${{ vars.K8S_NAMESPACE }}" \
            --timeout=180s

      - name: Verify deployment
        run: |
          kubectl get pods -n "${{ vars.K8S_NAMESPACE }}" -o wide
          kubectl get svc -n "${{ vars.K8S_NAMESPACE }}"
          kubectl get gateway -n "${{ vars.K8S_NAMESPACE }}"
          kubectl get httproute -n "${{ vars.K8S_NAMESPACE }}"
          curl -I https://test3.deltaintech.co.in || true